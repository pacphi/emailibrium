# Emailibrium LLM Model Catalog
# ============================================================================
# Maintainers: edit this file to add/update/remove available LLM models.
# The application reads this at startup and surfaces models in the Settings UI.
# Models are filtered by the user's available RAM at selection time.
#
# Provider compatibility:
#   - builtin: requires repo_id + filename (GGUF via llama.cpp)
#   - ollama: requires ollama_tag (pulled via `ollama pull`)
#   - openai: requires model name matching OpenAI API
#   - anthropic: requires model name matching Anthropic API
#   - openrouter: requires model name in provider/model format
# ============================================================================

version: "1.0"

providers:
