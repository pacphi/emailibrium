name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Backend jobs (separate for clear failure attribution)
  rust-format:
    name: Rust Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        working-directory: backend
        run: cargo fmt --all -- --check

  rust-clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Clippy
        working-directory: backend
        run: cargo clippy --workspace --all-targets -- -D warnings 2>&1 | grep -v "dead_code\|never used\|never constructed" || true

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    needs: [rust-format, rust-clippy]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Run tests
        working-directory: backend
        run: cargo test --workspace
      - name: Verify benchmarks compile
        working-directory: backend
        run: cargo bench --no-run

  rust-audit:
    name: Rust Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          working-directory: backend
        continue-on-error: true

  # Frontend jobs
  frontend-install:
    name: Frontend Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/pnpm-lock.yaml') }}

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    needs: frontend-install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Type check
        working-directory: frontend/apps/web
        run: npx tsc --noEmit
      - name: Format check
        working-directory: frontend/apps/web
        run: npx prettier --check 'src/**/*.{ts,tsx}'
      - name: Lint
        working-directory: frontend/apps/web
        run: npx eslint src/ || true
      - name: Build
        working-directory: frontend
        run: pnpm turbo build

  # Documentation validation
  validate-markdown:
    name: Validate Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'
          config: .markdownlint.yaml
        continue-on-error: true

  validate-yaml:
    name: Validate YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint YAML
        run: yamllint -c .yamllint.yaml .github/ backend/ docker-compose*.yml || true

  validate-shell:
    name: Validate Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: |
          find . -name "*.sh" -not -path "*/node_modules/*" -not -path "*/target/*" | while read -r script; do
            echo "Checking: $script"
            shellcheck "$script" || true
          done
