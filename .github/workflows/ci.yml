name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Backend jobs (separate for clear failure attribution)
  rust-format:
    name: Rust Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        working-directory: backend
        run: cargo fmt --package emailibrium -- --check

  rust-clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Clippy
        working-directory: backend
        run: |
          cargo clippy --workspace --all-targets -- \
            -D warnings \
            -A dead_code -A unused_variables -A unused_imports -A unused_mut

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    needs: [rust-format, rust-clippy]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Run tests
        working-directory: backend
        run: cargo test --workspace
      - name: Verify benchmarks compile
        working-directory: backend
        run: cargo bench --no-run

  rust-audit:
    name: Rust Security Audit
    runs-on: ubuntu-latest
    steps:
      # cargo audit only reads backend/Cargo.lock — no source code needed.
      # Do NOT fetch submodules: ruvector is a third-party submodule whose
      # availability we cannot control, and its HTTP 500s from GitHub cause
      # spurious job failures unrelated to our security posture.
      - uses: actions/checkout@v6
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      # Fetch the RUSTSEC advisory DB with retry so a transient GitHub 500
      # does not fail the job. The audit step uses --no-fetch after this.
      - name: Fetch advisory database
        run: |
          DB="$HOME/.cargo/advisory-db"
          for attempt in 1 2 3; do
            if [ -d "$DB" ]; then
              git -C "$DB" fetch --depth=1 origin master && break
            else
              git clone --depth=1 https://github.com/RustSec/advisory-db.git "$DB" && break
            fi
            echo "Attempt $attempt failed; retrying in 15s..."
            sleep 15
          done
      # Exceptions sourced from backend/audit-ignore (mirrors sindri pattern).
      # --no-fetch skips the network since we just fetched above.
      - name: Run cargo audit
        run: bash .github/scripts/cargo-audit.sh --no-fetch

  # Frontend jobs
  frontend-install:
    name: Frontend Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/pnpm-lock.yaml') }}

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    needs: frontend-install
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Type check
        working-directory: frontend/apps/web
        run: npx tsc --noEmit
      - name: Format check
        working-directory: frontend/apps/web
        run: npx prettier --check 'src/**/*.{ts,tsx}'
      - name: Lint
        working-directory: frontend/apps/web
        run: npx eslint src/
      - name: Build
        working-directory: frontend
        run: pnpm turbo build

  # Performance gates (ADR-005)
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: frontend-quality
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: frontend
        run: pnpm turbo build
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: frontend/lighthouserc.json
          uploadArtifacts: true
        continue-on-error: true

  bundlewatch:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    needs: frontend-quality
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: frontend
        run: pnpm turbo build
      - name: Check bundle size
        working-directory: frontend
        run: |
          echo "=== Bundle Size Report ==="
          du -sh apps/web/dist/ 2>/dev/null || echo "No dist directory"
          echo ""
          echo "=== JS Bundle Sizes ==="
          find apps/web/dist -name "*.js" -exec du -h {} + 2>/dev/null | sort -rh | head -20
          echo ""
          echo "=== CSS Bundle Sizes ==="
          find apps/web/dist -name "*.css" -exec du -h {} + 2>/dev/null | sort -rh | head -10
          echo ""
          # Fail if any single JS chunk exceeds 500KB
          OVERSIZED=$(find apps/web/dist -name "*.js" -size +500k 2>/dev/null)
          if [ -n "$OVERSIZED" ]; then
            echo "WARNING: The following JS bundles exceed 500KB:"
            echo "$OVERSIZED" | xargs du -h
            echo "Consider code-splitting or lazy loading to reduce bundle size."
          fi

  # Documentation validation
  validate-markdown:
    name: Validate Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"
          config: .markdownlint.yaml

  validate-yaml:
    name: Validate YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint YAML
        run: yamllint -c .yamllint.yaml .github/ backend/ docker-compose*.yml

  validate-shell:
    name: Validate Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: ShellCheck
        run: |
          set -e
          mapfile -t scripts < <(find . -name "*.sh" \
            -not -path "*/node_modules/*" \
            -not -path "*/target/*" \
            -not -path "*/ruvector/*" \
            -not -path "*/.claude/*")
          if [ "${#scripts[@]}" -eq 0 ]; then
            echo "No shell scripts found."
            exit 0
          fi
          printf 'Checking: %s\n' "${scripts[@]}"
          shellcheck "${scripts[@]}"
