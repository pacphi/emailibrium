name: Check Links

on:
  push:
    branches: [main]
    paths: ["**.md"]
  pull_request:
    paths: ["**.md"]
  schedule:
    - cron: "0 9 * * 1" # Weekly Monday 9am UTC
  workflow_dispatch:

jobs:
  check-internal-links:
    name: Internal Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose --no-progress --cache --max-cache-age 1d
            --scheme file --include-fragments
            --exclude-path node_modules --exclude-path target --exclude-path .git
            '**/*.md'
          fail: true
          jobSummary: true

  check-external-links:
    name: External Links
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-external-${{ github.sha }}
          restore-keys: lychee-external-
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose --no-progress --cache --max-cache-age 1d
            --scheme https --scheme http
            --exclude-path node_modules --exclude-path target
            --exclude '^http://localhost' --exclude '^https://localhost'
            --timeout 20 --max-concurrency 10
            --accept 200,206,301,302,307,308,429
            '**/*.md'
          fail: false
          jobSummary: true
          token: ${{ secrets.GITHUB_TOKEN }}
