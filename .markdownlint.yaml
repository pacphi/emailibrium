# markdownlint configuration
# See: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

# Allow long lines (docs often have tables/URLs/prose)
MD013: false

# Allow inline HTML (needed for some docs)
MD033: false

# Allow duplicate headings in different sections
MD024:
  siblings_only: true

# Allow trailing punctuation in headings
MD026: false

# Allow multiple top-level headings (some docs need this)
MD025: false

# Allow bare URLs
MD034: false

# Allow ordered lists with any prefix (ADR/DDD docs use sequential numbering)
MD029: false

# Allow emphasis as headings (common in ADR status lines)
MD036: false

# Allow mixed table column alignment styles
MD060: false
